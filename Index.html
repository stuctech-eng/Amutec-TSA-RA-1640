    import { createElement as h, useState, useEffect, useCallback } from "https://esm.sh/react@18";
    import { createRoot } from "https://esm.sh/react-dom@18/client";

    // ─── FIREBASE ────────────────────────────────────────────────────────────
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyCnSfhZOrgdsZdZCyadTWqQ6l6FDUrSYZk",
      authDomain: "tsa-d-roller-1600.firebaseapp.com",
      projectId: "tsa-d-roller-1600",
      storageBucket: "tsa-d-roller-1600.firebasestorage.app",
      messagingSenderId: "666565359033",
      appId: "1:666565359033:web:9de121dd12a7dff4bcb268"
    };

    let db = null;
    let FB = {};

    async function initFirebase() {
      try {
        const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const fs = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
        db = fs.getFirestore(app);
        FB = fs;
        return true;
      } catch(e) { console.error("Firebase fout:", e); return false; }
    }

    // ─── DATA ─────────────────────────────────────────────────────────────────
    const MATERIALEN = [
      { id:"recycle-mix",  label:"♻ Recycle Mix",   temp_b:170, temp_o:168, sv:0.70, st:1.30, recycle:true },
      { id:"recycle-peld", label:"♻ Recycle PE-LD", temp_b:163, temp_o:160, sv:0.80, st:1.20, recycle:true },
      { id:"recycle-pehd", label:"♻ Recycle PE-HD", temp_b:178, temp_o:175, sv:0.75, st:1.25, recycle:true },
      { id:"peld",         label:"PE-LD virgin",     temp_b:157, temp_o:154, sv:1.00, st:1.00, recycle:false },
      { id:"pehd",         label:"PE-HD virgin",     temp_b:172, temp_o:169, sv:0.90, st:1.10, recycle:false },
      { id:"pp",           label:"PP virgin",        temp_b:177, temp_o:174, sv:0.85, st:1.15, recycle:false },

    ];

    const PRODUCT_TYPES = ["Zak","Hoes","Vel","Krimpfolie","Andere"];
    const STATIC_OPTIES = ["Off","Always on","At end of roll"];

    const PROBLEMEN = [
      { id:"wissel",      cat:"ROLWISSEL",    kleur:"#ef4444", icon:"⚡", titel:"Wissel breekt / laat los",
        oorzaken:["Folie heeft slappe kant","Drukker laat los aan einde wissel","Roldiameter wissel te klein","Snelheid te hoog","Splicetape onvoldoende"],
        oplossingen:[{p:"hoog",t:"Static → 'At end of roll'"},{p:"hoog",t:"Roldiameter wissel verhogen"},{p:"hoog",t:"Snelheid verlagen bij wissel"},{p:"middel",t:"Hekje controleren en bijstellen"},{p:"middel",t:"Splicetape positie aanpassen"}] },
      { id:"scheef",      cat:"FOLIEGELEIDING", kleur:"#fb923c", icon:"↔", titel:"Folie loopt scheef",
        oorzaken:["Slappe kant folie","Hekje staat scheef","Niprollen niet parallel","Rol scheef op afroller"],
        oplossingen:[{p:"hoog",t:"Hekje centreren op folierand"},{p:"hoog",t:"Afroller loodrecht instellen"},{p:"middel",t:"Niprollen parallelstand controleren"},{p:"middel",t:"Static charger aanzetten"}] },
      { id:"slappe-kant", cat:"FOLIEGELEIDING", kleur:"#fb923c", icon:"〰", titel:"Slappe kant in folie",
        oorzaken:["Ongelijke dikte over breedte","Ongelijke winding op rol","Recycle: minder uniformiteit"],
        oplossingen:[{p:"hoog",t:"Static → 'Always on'"},{p:"hoog",t:"Hekje strakker aan slappe zijde"},{p:"middel",t:"Snelheid verlagen"}] },
      { id:"slap-strak",  cat:"FOLIEGELEIDING", kleur:"#fb923c", icon:"↕", titel:"Te slap / te strak neutrale zone",
        oorzaken:["Niprollen verkeerd ingesteld","Hekje te los of te strak","Na materiaalwissel niet herinsteld"],
        oplossingen:[{p:"hoog",t:"Te slap: niproldruk verhogen + hekje bijstellen"},{p:"hoog",t:"Te strak: niproldruk verlagen"},{p:"hoog",t:"Na materiaalwissel: niprollen opnieuw instellen"}] },
      { id:"perf-snel",   cat:"PERFORATIE", kleur:"#a78bfa", icon:"✂", titel:"Perforatie scheurt te snel",
        oorzaken:["Perforatie te diep","Foliespanning te hoog","Perforatiemessen bot"],
        oplossingen:[{p:"hoog",t:"Perforatiedruk verlagen"},{p:"hoog",t:"Dancer spanning verlagen"},{p:"hoog",t:"Mes vervangen"}] },
      { id:"perf-niet",   cat:"PERFORATIE", kleur:"#a78bfa", icon:"✂", titel:"Zak scheurt niet goed af",
        oorzaken:["Perforatie te licht","Mes bot","Folie te elastisch"],
        oplossingen:[{p:"hoog",t:"Perforatie dieper zetten"},{p:"hoog",t:"Mes vervangen"}] },
      { id:"seal-breekt", cat:"SEAL", kleur:"#f59e0b", icon:"◈", titel:"Seal breekt open",
        oorzaken:["Temperatuur te laag","Sealtijd te kort","Sealdruk te laag"],
        oplossingen:[{p:"hoog",t:"Temperatuur verhogen"},{p:"hoog",t:"Sealtijd verhogen"},{p:"hoog",t:"Druk controleren"}] },
      { id:"seal-brand",  cat:"SEAL", kleur:"#f59e0b", icon:"🔥", titel:"Seal verbrandt",
        oorzaken:["Temperatuur te hoog","Sealtijd te lang","PTFE tape beschadigd"],
        oplossingen:[{p:"hoog",t:"Temperatuur verlagen"},{p:"hoog",t:"Sealtijd verkorten"},{p:"hoog",t:"PTFE tape vervangen"}] },
      { id:"seal-rek",    cat:"SEAL", kleur:"#f59e0b", icon:"↕", titel:"Uitgerekte seal",
        oorzaken:["Folie te strak in neutrale zone","Koeltijd te kort","Niprollen trekken te vroeg"],
        oplossingen:[{p:"hoog",t:"Niproldruk verlagen"},{p:"hoog",t:"Koeltijd verhogen"},{p:"middel",t:"Temperatuur iets verlagen"}] },
      { id:"static",      cat:"STATIC", kleur:"#60a5fa", icon:"⚡", titel:"Static charger instelling",
        oorzaken:["PE/PP slecht geleidend","Droge omgeving","Recycle: onregelmatig oppervlak"],
        oplossingen:[{p:"hoog",t:"Einde rol: 'At end of roll'"},{p:"hoog",t:"Slappe folie: 'Always on'"},{p:"middel",t:"Static charger reinigen"}] },
      { id:"winder-slap", cat:"WINDER", kleur:"#34d399", icon:"🔄", titel:"Rol bouwt niet strak op",
        oorzaken:["Winder torque te laag","Roldruk te laag"],
        oplossingen:[{p:"hoog",t:"Torque verhogen"},{p:"hoog",t:"Drukrol controleren"}] },
      { id:"winder-scheef",cat:"WINDER", kleur:"#34d399", icon:"↗", titel:"Rol wordt scheef",
        oorzaken:["Folie niet gecentreerd","Winder spanning ongelijk"],
        oplossingen:[{p:"hoog",t:"Folie centreren"},{p:"hoog",t:"Winder torque aanpassen"}] },
    ];

    const CATS = ["ROLWISSEL","FOLIEGELEIDING","PERFORATIE","SEAL","STATIC","WINDER"];
    const CAT_KLEUR = { ROLWISSEL:"#ef4444", FOLIEGELEIDING:"#fb923c", PERFORATIE:"#a78bfa", SEAL:"#f59e0b", STATIC:"#60a5fa", WINDER:"#34d399" };
    const SNELKNOPPEN = [
      {label:"⚡ Seal probleem", cat:"SEAL"},
      {label:"↔ Folie scheef",  cat:"FOLIEGELEIDING"},
      {label:"🔄 Rol niet strak",cat:"WINDER"},
      {label:"⚡ Static",        cat:"STATIC"},
    ];

    // ─── BEREKENING ──────────────────────────────────────────────────────────
    function berekenParams({lengte_mm, dikte_mu, materiaal_id, koker_dia=76, rol_dia=300}) {
      const mat = MATERIALEN.find(m => m.id === materiaal_id) || MATERIALEN[3];
      const l = parseFloat(lengte_mm)||0, d = parseFloat(dikte_mu)||0;
      const koker = parseFloat(koker_dia)||76, rol = parseFloat(rol_dia)||300;
      const sealtijd = +(d * 0.025 * mat.st).toFixed(2);
      const snelheid = +(200 * mat.sv).toFixed(0);
      const zakken_min = l > 0 ? +(snelheid * 1000 / l).toFixed(0) : 0;
      const zakken_rol = (l>0&&d>0) ? Math.floor((Math.PI*(rol**2-koker**2))/(4*(d/1000)*l)) : 0;
      return { seal_temp_boven:mat.temp_b, seal_temp_onder:mat.temp_o, seal_tijd:sealtijd, snelheid_mat:snelheid, zakken_min, zakken_rol };
    }

    function leegRecept() {
      return { versie:"v1.0", datum:new Date().toISOString().split("T")[0],
        materiaal_id:"recycle-mix", breedte_mm:"", lengte_mm:"", dikte_mu:"",
        seal_tijd:"", snelheid_mat:"", zakken_min:"", zakken_rol:"",
        static_charger:"Off", static_mat:"", koker_dia:76, rol_dia:300,
        cycle_drukker:false, cycle_inst:"", seal_temp_boven:"", seal_temp_onder:"", notities:"" };
    }

    // ─── STIJLEN ─────────────────────────────────────────────────────────────
    const C = {
      bg:"#070a10", panel:"#0f1520", border:"#1a2540",
      amber:"#f59e0b", amberDim:"#451a03", amberBright:"#fcd34d",
      text:"#e5e7eb", textDim:"#6b7280", textMuted:"#374151",
      red:"#ef4444", redDim:"#450a0a", green:"#34d399", greenDim:"#052e16",
      blue:"#60a5fa", blueDim:"#0f2744",
    };

    const css = (obj) => Object.entries(obj).map(([k,v]) => `${k.replace(/([A-Z])/g,'-$1').toLowerCase()}:${v}`).join(';');

    // ─── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [ingelogd, setIngelogd] = useState(false);
      const [pw, setPw] = useState("");
      const [pwFout, setPwFout] = useState(false);
      const [scherm, setScherm] = useState("recepten");
      const [fbOk, setFbOk] = useState(false);
      const [fbLaden, setFbLaden] = useState(true);
      const [klanten, setKlanten] = useState([]);
      const [klantId, setKlantId] = useState(null);
      const [productId, setProductId] = useState(null);
      const [receptId, setReceptId] = useState(null);
      const [receptTab, setReceptTab] = useState(0);
      const [toonNieuwKlant, setToonNieuwKlant] = useState(false);
      const [toonNieuwProduct, setToonNieuwProduct] = useState(false);
      const [nieuwKlantNr, setNieuwKlantNr] = useState("");
      const [nieuwKlantNaam, setNieuwKlantNaam] = useState("");
      const [nieuwProdType, setNieuwProdType] = useState("Zak");
      const [nieuwProdOms, setNieuwProdOms] = useState("");

      useEffect(() => {
        initFirebase().then(ok => { setFbOk(ok); setFbLaden(false); });
      }, []);

      useEffect(() => {
        if (!fbOk || !db) return;
        const unsub = FB.onSnapshot(FB.collection(db, "klanten"), snap => {
          const data = snap.docs.map(d => ({id:d.id, ...d.data(), producten:d.data().producten||[]}));
          data.sort((a,b) => (a.naam||"").localeCompare(b.naam||""));
          setKlanten(data);
        });
        return unsub;
      }, [fbOk]);

      function login() {
        if (pw === "tsa1600") setIngelogd(true);
        else setPwFout(true);
      }

      async function voegKlantToe() {
        if (!nieuwKlantNr||!nieuwKlantNaam||!fbOk) return;
        await FB.addDoc(FB.collection(db,"klanten"), {nr:nieuwKlantNr, naam:nieuwKlantNaam, producten:[]});
        setNieuwKlantNr(""); setNieuwKlantNaam(""); setToonNieuwKlant(false);
      }

      async function verwijderKlant(id) {
        if (!confirm("Klant verwijderen?")||!fbOk) return;
        await FB.deleteDoc(FB.doc(db,"klanten",id));
        if (klantId===id) { setKlantId(null); setProductId(null); setReceptId(null); }
      }

      async function updateKlantDoc(klant, nieuweProducten) {
        if (!fbOk) return;
        await FB.updateDoc(FB.doc(db,"klanten",klant.id), {producten:nieuweProducten});
      }

      async function voegProductToe() {
        const klant = klanten.find(k=>k.id===klantId);
        if (!klant||!fbOk) return;
        const prod = {id:Date.now().toString(), type:nieuwProdType, omschrijving:nieuwProdOms, recepten:[]};
        await updateKlantDoc(klant, [...klant.producten, prod]);
        setNieuwProdType("Zak"); setNieuwProdOms(""); setToonNieuwProduct(false);
      }

      async function verwijderProduct(prodId) {
        const klant = klanten.find(k=>k.id===klantId);
        if (!klant||!fbOk||!confirm("Product verwijderen?")) return;
        await updateKlantDoc(klant, klant.producten.filter(p=>p.id!==prodId));
        if (productId===prodId) { setProductId(null); setReceptId(null); }
      }

      async function nieuwRecept() {
        const klant = klanten.find(k=>k.id===klantId);
        const prod = klant?.producten?.find(p=>p.id===productId);
        if (!prod||!fbOk) return;
        const rec = {id:Date.now().toString(), ...leegRecept()};
        const nieuweProds = klant.producten.map(p=>p.id===productId?{...p,recepten:[...p.recepten,rec]}:p);
        await updateKlantDoc(klant, nieuweProds);
        setReceptId(rec.id); setReceptTab(0);
      }

      async function slaReceptOp(recept) {
        const klant = klanten.find(k=>k.id===klantId);
        if (!klant||!fbOk) return;
        const nieuweProds = klant.producten.map(p=>
          p.id===productId?{...p,recepten:p.recepten.map(r=>r.id===recept.id?recept:r)}:p);
        await updateKlantDoc(klant, nieuweProds);
      }

      async function verwijderRecept(recId) {
        const klant = klanten.find(k=>k.id===klantId);
        if (!klant||!fbOk||!confirm("Recept verwijderen?")) return;
        const nieuweProds = klant.producten.map(p=>
          p.id===productId?{...p,recepten:p.recepten.filter(r=>r.id!==recId)}:p);
        await updateKlantDoc(klant, nieuweProds);
        if (receptId===recId) setReceptId(null);
      }

      const klant = klanten.find(k=>k.id===klantId);
      const product = klant?.producten?.find(p=>p.id===productId);
      const recept = product?.recepten?.find(r=>r.id===receptId);

      const S = {
        app: {minHeight:"100dvh",background:C.bg,color:C.text,display:"flex",flexDirection:"column",fontFamily:"'DM Mono','Courier New',monospace",maxWidth:"480px",margin:"0 auto"},
        header: {background:C.panel,borderBottom:`2px solid ${C.amber}`,padding:"env(safe-area-inset-top, 10px) 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0},
        logo: {fontSize:"20px",fontWeight:900,color:C.amber,letterSpacing:"4px"},
        model: {fontSize:"11px",color:C.textDim,letterSpacing:"2px"},
        navBtn: {background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,padding:"8px 12px",borderRadius:"6px",cursor:"pointer",fontSize:"16px"},
        navActief: {borderColor:C.amber,color:C.amber,background:C.amberDim},
        bc: {background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"8px 16px",display:"flex",alignItems:"center",gap:"4px",flexShrink:0,overflowX:"auto"},
        bcLink: {fontSize:"12px",color:C.blue,cursor:"pointer",whiteSpace:"nowrap",textDecoration:"underline"},
        bcActief: {fontSize:"12px",color:C.textDim,whiteSpace:"nowrap"},
        bcSep: {fontSize:"12px",color:C.textMuted},
        content: {flex:1,overflow:"auto",paddingBottom:"70px"},
        bottomNav: {position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:C.panel,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom, 0px)",zIndex:100},
        bottomBtn: {flex:1,padding:"10px 0",background:"transparent",border:"none",color:C.textDim,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"},
        bottomActief: {color:C.amber},
        bottomIcon: {fontSize:"22px"},
        bottomLabel: {fontSize:"10px",letterSpacing:"1px"},
      };

      if (!ingelogd) return h("div", {style:{...S.app,alignItems:"center",justifyContent:"center"}},
        h("div", {style:{background:C.panel,border:`1px solid ${C.amber}33`,borderRadius:"12px",padding:"48px 32px",textAlign:"center",width:"85%",maxWidth:"360px"}},
          h("div", {style:{fontSize:"44px",fontWeight:900,color:C.amber,letterSpacing:"8px",marginBottom:"4px"}}, "TSA"),
          h("div", {style:{fontSize:"13px",color:C.textDim,letterSpacing:"3px",marginBottom:"4px"}}, "D-Roller 1600"),
          h("div", {style:{fontSize:"10px",color:C.textMuted,letterSpacing:"2px",marginBottom:"28px"}}, "MACHINE DATABASE"),
          fbLaden && h("div", {style:{fontSize:"11px",color:C.textDim,marginBottom:"12px"}}, "🔄 Firebase verbinden..."),
          !fbLaden && fbOk && h("div", {style:{fontSize:"11px",color:C.green,marginBottom:"12px"}}, "✓ Firebase verbonden"),
          !fbLaden && !fbOk && h("div", {style:{fontSize:"11px",color:C.red,marginBottom:"12px"}}, "⚠ Firebase fout"),
          h("input", {style:{background:"#0a0d14",border:`1px solid ${C.border}`,color:C.text,padding:"12px 16px",borderRadius:"8px",fontSize:"16px",width:"100%",textAlign:"center",letterSpacing:"6px",marginBottom:"10px",boxSizing:"border-box"},
            type:"password", placeholder:"Wachtwoord", value:pw,
            onChange:e=>{setPw(e.target.value);setPwFout(false);},
            onKeyDown:e=>e.key==="Enter"&&login()}),
          pwFout && h("div", {style:{color:C.red,fontSize:"12px",marginBottom:"8px"}}, "Ongeldig wachtwoord"),
          h("button", {style:{background:C.amber,color:"#0a0d14",border:"none",padding:"13px 0",borderRadius:"8px",cursor:"pointer",fontWeight:900,fontSize:"15px",width:"100%",letterSpacing:"3px",marginBottom:"14px",fontFamily:"inherit"},
            onClick:login}, "INLOGGEN"),
          h("div", {style:{fontSize:"10px",color:C.textMuted}}, "Wachtwoord: ", h("span",{style:{color:C.amber}},"tsa1600"))
        )
      );

      return h("div", {style:S.app},
        h("header", {style:S.header},
          h("div", {style:{display:"flex",alignItems:"baseline",gap:"8px"}},
            h("span",{style:S.logo},"TSA"),
            h("span",{style:S.model},"D-Roller 1600")
          ),
          h("div", {style:{display:"flex",gap:"6px",alignItems:"center"}},
            h("button",{style:{...S.navBtn,...(scherm==="recepten"?S.navActief:{})},onClick:()=>setScherm("recepten")},"📋"),
            h("button",{style:{...S.navBtn,...(scherm==="problemen"?S.navActief:{})},onClick:()=>setScherm("problemen")},"🔧"),
            h("button",{style:{...S.navBtn},onClick:()=>setIngelogd(false)},"↩")
          )
        ),

        scherm==="recepten" && h("div",{style:S.bc},
          h("span",{style:klantId?S.bcLink:S.bcActief,onClick:()=>{setKlantId(null);setProductId(null);setReceptId(null);}},"Klanten"),
          klantId && h("span",{style:S.bcSep},"›"),
          klantId && h("span",{style:productId?S.bcLink:S.bcActief,onClick:()=>{setProductId(null);setReceptId(null);}},klant?.naam||klant?.nr||""),
          productId && h("span",{style:S.bcSep},"›"),
          productId && h("span",{style:receptId?S.bcLink:S.bcActief,onClick:()=>setReceptId(null)},product?.type||""),
          receptId && h("span",{style:S.bcSep},"›"),
          receptId && h("span",{style:S.bcActief},recept?.versie||"")
        ),

        h("div",{style:S.content},
          scherm==="problemen" && h(ProbleemScherm,null),
          scherm==="recepten" && !klantId && h(KlantenLijst,{klanten,onKies:setKlantId,onVerwijder:verwijderKlant,toonNieuw:toonNieuwKlant,setToonNieuw:setToonNieuwKlant,nr:nieuwKlantNr,setNr:setNieuwKlantNr,naam:nieuwKlantNaam,setNaam:setNieuwKlantNaam,onToevoegen:voegKlantToe}),
          scherm==="recepten" && klantId && !productId && h(ProductenLijst,{klant,onKies:setProductId,onVerwijder:verwijderProduct,toonNieuw:toonNieuwProduct,setToonNieuw:setToonNieuwProduct,type:nieuwProdType,setType:setNieuwProdType,oms:nieuwProdOms,setOms:setNieuwProdOms,onToevoegen:voegProductToe}),
          scherm==="recepten" && klantId && productId && !receptId && h(ReceptenLijst,{product,onKies:setReceptId,onVerwijder:verwijderRecept,onNieuw:nieuwRecept}),
          scherm==="recepten" && klantId && productId && receptId && recept && h(ReceptDetail,{recept,tab:receptTab,setTab:setReceptTab,onSave:slaReceptOp})
        ),

        h("nav",{style:S.bottomNav},
          h("button",{style:{...S.bottomBtn,...(scherm==="recepten"?S.bottomActief:{})},onClick:()=>setScherm("recepten")},
            h("span",{style:S.bottomIcon},"📋"),
            h("span",{style:S.bottomLabel},"Recepten")
          ),
          h("button",{style:{...S.bottomBtn,...(scherm==="problemen"?S.bottomActief:{})},onClick:()=>setScherm("problemen")},
            h("span",{style:S.bottomIcon},"🔧"),
            h("span",{style:S.bottomLabel},"Problemen")
          )
        )
      );
    }

    // ─── LIJSTEN ─────────────────────────────────────────────────────────────
    const C2 = {

        const data={...form,...updates};

        else setForm(prev=>({...prev,...updates}));
      }
      async function opslaan(){await onSave(form);setOpgeslagen(true);setTimeout(()=>setOpgeslagen(false),2000);}

              h("div",{style:PS.kaartTitel},prob.titel)
            ),
            h("span",{style:PS.chevron},actief===prob.id?"▲":"▼")
          ),
          actief===prob.id && h("div",{style:PS.detail,onClick:e=>e.stopPropagation()},
            h("div",{style:PS.sectieLabel},"OORZAKEN"),
            prob.oorzaken.map((o,i)=>h("div",{key:i,style:PS.oorzaak},"● ",o)),
            h("div",{style:{...PS.sectieLabel,marginTop:"14px"}},"OPLOSSINGEN"),
            prob.oplossingen.map((o,i)=>h("div",{key:i,style:{...PS.oplossing,borderLeft:`3px solid ${o.p==="hoog"?"#ef4444":o.p==="middel"?"#f59e0b":"#374151"}`}},
              h("span",{style:{...PS.prioBadge,background:o.p==="hoog"?"#450a0a":o.p==="middel"?"#451a03":"#1e293b",color:o.p==="hoog"?"#fca5a5":o.p==="middel"?"#fcd34d":"#6b7280"}},o.p.toUpperCase()),
              h("span",{style:PS.oplossingTekst},o.t)
            ))
          )
        ))
      );
    }

    // ─── START ───────────────────────────────────────────────────────────────
    createRoot(document.getElementById("root")).render(h(App, null));
  </script>

</body>
</html>
