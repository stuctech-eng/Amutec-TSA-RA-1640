*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#070a10;color:#e5e7eb;font-family:'Courier New',Courier,monospace;font-size:17px;overscroll-behavior:none;}
.topbar{background:#0f1520;border-bottom:2px solid #f59e0b;height:56px;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;}
.back-btn{background:none;border:1px solid #1a2540;border-radius:4px;color:#f59e0b;font-size:22px;cursor:pointer;padding:4px 10px;line-height:1;}
.topbar-title{font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:#e5e7eb;flex:1;}
.content{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 80px;}
.form-card{background:#0f1520;border:1px solid #1a2540;border-top:2px solid #f59e0b;border-radius:4px;padding:16px;margin-bottom:12px;}
.form-card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#f59e0b;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1a2540;}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:9px;color:#9ca3af;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.veld-leeg{background:rgba(245,158,11,0.08)!important;border-color:rgba(245,158,11,0.6)!important;color:#fcd34d!important}
.veld-definitief{background:rgba(52,211,153,0.08)!important;border-color:rgba(52,211,153,0.6)!important;color:#6ee7b7!important}
.bottom-back-btn{width:100%;background:#0f1520;border:none;border-top:1px solid #1a2540;color:#9ca3af;font-family:'Courier New',Courier,monospace;font-size:14px;letter-spacing:1px;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;position:sticky;bottom:0;z-index:50;}
.bottom-back-btn:active{background:#141d2e;}
.invul-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9100;display:none;align-items:flex-end;justify-content:center;}
.invul-box{background:#0f1520;border-top:3px solid #f59e0b;width:100%;max-width:480px;padding:24px 20px 36px;border-radius:12px 12px 0 0;}
.invul-label{font-size:10px;color:#9ca3af;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.invul-waarde{font-size:52px;font-weight:700;color:#e5e7eb;text-align:center;margin-bottom:16px;min-height:64px;letter-spacing:2px;background:#070a10;border:2px solid #1a2540;border-radius:8px;padding:12px;}
.invul-waarde.geel{border-color:rgba(245,158,11,0.6);color:#fcd34d;}
.invul-waarde.groen{border-color:rgba(52,211,153,0.6);color:#6ee7b7;}
.invul-snel{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.invul-snel-btn{background:#141d2e;border:1px solid #1a2540;border-radius:6px;color:#9ca3af;font-family:'Courier New',Courier,monospace;font-size:14px;font-weight:700;padding:10px 16px;cursor:pointer;flex:1;min-width:60px;text-align:center;}
.invul-snel-btn:active{background:#f59e0b;color:#000;}
.invul-nrs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.invul-nr{background:#141d2e;border:1px solid #1a2540;border-radius:8px;color:#e5e7eb;font-family:'Courier New',Courier,monospace;font-size:26px;font-weight:700;padding:18px 0;cursor:pointer;text-align:center;}
.invul-nr:active{background:#f59e0b;color:#000;}
.invul-ok{width:100%;background:#34d399;color:#000;border:none;border-radius:8px;font-family:'Courier New',Courier,monospace;font-weight:700;font-size:18px;letter-spacing:2px;padding:16px;cursor:pointer;margin-top:4px;}
.invul-annuleer{width:100%;background:transparent;border:1px solid #1a2540;border-radius:8px;color:#6b7280;font-family:'Courier New',Courier,monospace;font-size:13px;padding:12px;cursor:pointer;margin-top:8px;}
</style>
</head>

      <div class="invul-nr" onclick="invulCijfer('7')">7</div><div class="invul-nr" onclick="invulCijfer('8')">8</div><div class="invul-nr" onclick="invulCijfer('9')">9</div>
      <div class="invul-nr" onclick="invulCijfer('4')">4</div><div class="invul-nr" onclick="invulCijfer('5')">5</div><div class="invul-nr" onclick="invulCijfer('6')">6</div>
      <div class="invul-nr" onclick="invulCijfer('1')">1</div><div class="invul-nr" onclick="invulCijfer('2')">2</div><div class="invul-nr" onclick="invulCijfer('3')">3</div>
      <div class="invul-nr" onclick="invulCijfer('.')">.</div><div class="invul-nr" onclick="invulCijfer('0')">0</div><div class="invul-nr" onclick="invulWis()" style="color:#ef4444;">&#9003;</div>
    </div>
    <button class="invul-ok" onclick="invulOk()">OK &#10003;</button>
    <button class="invul-annuleer" onclick="invulSluit()">Annuleer</button>
  </div>
</div>

<script>
'use strict';
var _pcPallet='euro', _pcMaxH=1550, _pcPatroon='auto';
var _invulEl=null, _invulWaarde='';

function openPcPopup(naam){document.getElementById('pc-popup-'+naam).style.display='flex';}
function sluitPcPopup(naam){document.getElementById('pc-popup-'+naam).style.display='none';}

function kiesPcProdtype(type){
  document.getElementById('pc-prodtype').value=type;
  document.getElementById('toon-pc-prodtype').textContent=type;
  document.getElementById('toon-pc-prodtype').style.color='#6ee7b7';
  document.getElementById('btn-pc-prodtype').style.borderLeftColor='#34d399';
  ['Zak','Zak met invouw','Hoes','Vel','Huls','Krimpfolie','Uitsparing','Andere'].forEach(function(t){
    var el=document.getElementById('pck-'+t);if(el)el.style.display=t===type?'inline':'none';
  });
  sluitPcPopup('prodtype');
  pcBereken();
}

function kiesPcMateriaal(key,label){
  document.getElementById('pc-materiaal').value=key;
  document.getElementById('toon-pc-materiaal').innerHTML=label;
  document.getElementById('toon-pc-materiaal').style.color='#6ee7b7';
  document.getElementById('btn-pc-materiaal').style.borderLeftColor='#34d399';
  ['ldpe','mdpe','recycle-mix','recycle-peld'].forEach(function(k){
    var el=document.getElementById('pckm-'+k);if(el)el.style.display=k===key?'inline':'none';
  });
  sluitPcPopup('materiaal');
  pcBereken();
}

function lagenPerProdtype(p){
  if(p==='Vel'||p==='Huls') return 1;
  if(p==='Zak met invouw') return 4;
  return 2;
}

function toonTab(tab){
  document.getElementById('sectie-config').style.display=tab==='config'?'block':'none';
  document.getElementById('sectie-uitleg').style.display=tab==='uitleg'?'block':'none';
  var btnC=document.getElementById('tab-config'),btnU=document.getElementById('tab-uitleg');
  if(tab==='config'){
    btnC.style.borderColor='#34d399';btnC.style.background='rgba(52,211,153,0.15)';btnC.style.color='#34d399';
    btnU.style.borderColor='#1a2540';btnU.style.background='#0f1520';btnU.style.color='#9ca3af';
  } else {
    btnU.style.borderColor='#34d399';btnU.style.background='rgba(52,211,153,0.15)';btnU.style.color='#34d399';
    btnC.style.borderColor='#1a2540';btnC.style.background='#0f1520';btnC.style.color='#9ca3af';
    updatePatroonTabel();
  }
}

function pcKiesPallet(type){
  _pcPallet=type;
  ['euro','blok'].forEach(function(t){
    var btn=document.getElementById('pc-btn-'+t);if(!btn)return;
    if(t===type){btn.style.borderColor='#34d399';btn.style.background='rgba(52,211,153,0.15)';btn.style.color='#34d399';}
    else{btn.style.borderColor='#1a2540';btn.style.background='#0f1520';btn.style.color='#9ca3af';}
  });
  updatePatroonTabel();
  pcBereken();
}

function pcKiesHoogte(h){
  _pcMaxH=h;
  var isH=h===1550;
  var b1=document.getElementById('pc-btn-h1700'),b2=document.getElementById('pc-btn-h1200');
  if(b1){b1.style.borderColor=isH?'#34d399':'#1a2540';b1.style.background=isH?'rgba(52,211,153,0.15)':'#0f1520';b1.style.color=isH?'#34d399':'#9ca3af';}
  if(b2){b2.style.borderColor=!isH?'#34d399':'#1a2540';b2.style.background=!isH?'rgba(52,211,153,0.15)':'#0f1520';b2.style.color=!isH?'#34d399':'#9ca3af';}
  pcBereken();
}

function pcKiesPatroon(pat){
  _pcPatroon=pat;
  ['auto','43','54','65'].forEach(function(p){
    var btn=document.getElementById('pc-pat-'+p);if(!btn)return;
    if(p===pat){btn.style.borderColor='#34d399';btn.style.background='rgba(52,211,153,0.15)';btn.style.color='#34d399';}
    else{btn.style.borderColor='#1a2540';btn.style.background='#0f1520';btn.style.color='#9ca3af';}
  });
  pcBereken();
}

function updatePatroonTabel(){
  var palletB=_pcPallet==='blok'?1000:800;
  var grens43=300;
  var grensZigzag=Math.floor(palletB/2);
  var tabel=document.getElementById('patroon-tabel-staand');
  if(!tabel)return;
  tabel.innerHTML=
    '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2540;"><span style="color:#60a5fa;font-weight:700;">Dia. &le;'+grens43+'mm</span><span style="color:#e5e7eb;">4-3-4 piramide (11/laag)</span></div>'+
    '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a2540;"><span style="color:#60a5fa;font-weight:700;">Dia. '+(grens43+1)+'-'+grensZigzag+'mm</span><span style="color:#e5e7eb;">Zigzag 2 rijen</span></div>'+
    '<div style="display:flex;justify-content:space-between;padding:8px 0;"><span style="color:#9ca3af;font-weight:700;">Dia. &gt;'+grensZigzag+'mm</span><span style="color:#9ca3af;">Liggend stapelen</span></div>';
}

function rr(lbl,val,kleur){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a2540;"><div style="color:#9ca3af;font-size:11px;letter-spacing:1px;">'+lbl+'</div><div style="color:'+(kleur||'#e5e7eb')+';font-size:18px;font-weight:700;">'+val+'</div></div>';
}

function pcBereken(){
  var palletB=_pcPallet==='blok'?1000:800;
  var palletNaam=_pcPallet==='blok'?'Blokpallet 1000mm':'Euro pallet 800mm';
  var breedte=parseFloat(document.getElementById('pc-breedte').value)||0;
  var rolDInput=parseFloat(document.getElementById('pc-rolD').value)||0;
  var zakrol=parseFloat(document.getElementById('pc-zakrol').value)||0;
  var lengte=parseFloat(document.getElementById('pc-lengte').value)||0;
  var dikte=parseFloat(document.getElementById('pc-dikte').value)||0;
  var koker=parseFloat(document.getElementById('pc-koker').value)||90;
  var aantalRollen=parseFloat(document.getElementById('pc-rollen').value)||0;
  var prodtype=document.getElementById('pc-prodtype').value;

  // Toon/verberg patroon sectie
  var patSectie=document.getElementById('pc-patroon-sectie');
  if(patSectie) patSectie.style.display=(breedte>500||!breedte)?'block':'none';

  // Bereken rolD
  var rolD=rolDInput;
  if(!rolD&&zakrol&&lengte&&dikte){
    var lagen=lagenPerProdtype(prodtype);
    rolD=Math.round(Math.sqrt((koker/2)*(koker/2)+(zakrol*lengte*dikte*lagen)/Math.PI)*2);
    var autoEl=document.getElementById('pc-rolD-auto');
    if(autoEl) autoEl.textContent='Auto: '+rolD+'mm';
  } else {
    var autoEl2=document.getElementById('pc-rolD-auto');
    if(autoEl2) autoEl2.textContent='';
  }
  if(!rolD){document.getElementById('pc-resultaat').style.display='none';return;}

  var staand=breedte>0&&breedte<=500;
  var html='',visual='',rpp=0,stapelHoogte=0,maxLagen=0,patroonLabel='';

  var ROL='<span style="display:inline-block;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#3b82f6);border:2px solid #93c5fd;margin:3px;vertical-align:middle;"></span>';
  var ROL_M='<span style="display:inline-block;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:2px solid #c4b5fd;margin:3px;vertical-align:middle;"></span>';

  if(staand){
    var laagHoogte=breedte;
    maxLagen=Math.min(2,Math.max(1,Math.floor(_pcMaxH/laagHoogte)));
    var grens43=300,grensZigzag=Math.floor(palletB/2);
    var rollenPerLaag,zigzag=false;

    if(rolD<=grens43){
      rollenPerLaag=11;patroonLabel='4-3-4 piramide';
    } else if(rolD<=grensZigzag){
      zigzag=true;
      var rij=Math.max(1,Math.floor(1200/rolD));
      rollenPerLaag=rij*2;patroonLabel='Zigzag '+rij+'+'+rij;
    } else {
      zigzag=true;
      var rij2=Math.max(1,Math.floor(1200/rolD));
      rollenPerLaag=rij2*2;patroonLabel='Zigzag '+rij2+'+'+rij2;
    }
    stapelHoogte=Math.round(maxLagen*laagHoogte);
    rpp=rollenPerLaag*maxLagen;

    html=rr('PALLET',palletNaam)+rr('ROLDIAMETER',rolD+'mm','#60a5fa')+
         rr('STAPELWIJZE',zigzag?'Staand zigzag':'Staand piramide','#60a5fa')+
         rr('PATROON',patroonLabel,'#60a5fa')+
         rr('ROLLEN PER LAAG',rollenPerLaag+' rollen','#34d399')+
         rr('AANTAL LAGEN',maxLagen+' lagen','#a78bfa')+
         rr('STAPELHOOGTE',stapelHoogte+'mm')+
         rr('ROLLEN PER PALLET',rpp+' rollen','#f59e0b');

    if(aantalRollen>0){
      var p=Math.ceil(aantalRollen/rpp),l=aantalRollen%rpp;
      html+=rr('AANTAL PALLETS',p+' pallets','#f59e0b');
      if(l>0)html+=rr('LOS OP PALLET',l+' rollen','#9ca3af');
    }
    html+=rr('HUIDJES','Niet nodig bij staand','#6b7280');

    // Visualisatie staand
    for(var lg=maxLagen;lg>=1;lg--){
      if(rolD<=300){
        visual+='<div style="display:flex;justify-content:center;margin:2px 0;">';
        for(var i=0;i<4;i++) visual+=ROL;
        visual+='</div><div style="display:flex;justify-content:center;margin:2px 0;padding-left:18px;">';
        for(var j=0;j<3;j++) visual+=ROL_M;
        visual+='</div><div style="display:flex;justify-content:center;margin:2px 0;">';
        for(var k=0;k<4;k++) visual+=ROL;
        visual+='</div>';
      } else {
        var rj=Math.max(1,Math.floor(1200/rolD));
        visual+='<div style="display:flex;justify-content:center;margin:2px 0;">';
        for(var r1=0;r1<rj;r1++) visual+=ROL;
        visual+='</div><div style="display:flex;justify-content:center;margin:2px 0;padding-left:18px;">';
        for(var r2=0;r2<rj;r2++) visual+=ROL_M;
        visual+='</div>';
      }
      if(lg>1)visual+='<div style="border-top:1px dashed #1a2540;margin:10px 20px;"></div>';
    }

  } else {
    // LIGGEND - bereken beste oriëntatie
    var rijA2_l=Math.max(1,Math.floor(palletB/rolD));
    var rijB2_l=Math.max(1,rijA2_l-1);
    maxLagen=1;
    for(var nl=2;nl<=20;nl++){if(rolD+(nl-1)*rolD*0.866<=_pcMaxH)maxLagen=nl;else break;}
    var paren=Math.floor(maxLagen/2),extra=maxLagen%2;
    var rpp_l=paren*(rijA2_l+rijB2_l)+extra*rijA2_l;
    var rijA2_b=Math.max(1,Math.floor(1200/rolD));
    var rijB2_b=Math.max(1,rijA2_b-1);
    var rpp_b2=paren*(rijA2_b+rijB2_b)+extra*rijA2_b;
    var rijA2=rpp_b2>rpp_l?rijA2_b:rijA2_l;
    var rijB2=rpp_b2>rpp_l?rijB2_b:rijB2_l;
    rpp=Math.max(rpp_l,rpp_b2);
    stapelHoogte=Math.round(rolD+(maxLagen-1)*rolD*0.866);

    var huidjeRuw=rijA2*rolD+90;
    var hMaten=[700,750,800,850,900,950,1000,1050,1100,1150,1200,1250,1300,1350,1400];
    var huidje=hMaten[hMaten.length-1];
    for(var hi=0;hi<hMaten.length;hi++){if(hMaten[hi]>=huidjeRuw){huidje=hMaten[hi];break;}}

    var pallets2=0,losRollen=0,rppToon=rpp;
    if(aantalRollen>0){
      var volP=Math.floor(aantalRollen/rpp),rest=aantalRollen%rpp;
      if(rest===0)pallets2=volP;
      else if(rest<=4){pallets2=volP;losRollen=rest;}
      else if(volP>0&&rest<=volP){pallets2=volP;rppToon=rpp+1;}
      else pallets2=volP+1;
      if(pallets2===0)pallets2=1;
    }
    var aH=pallets2>0?Math.floor(maxLagen/2)*pallets2:0;

    html=rr('PALLET',palletNaam)+rr('ROLDIAMETER',rolD+'mm','#60a5fa')+
         rr('STAPELWIJZE','Liggend piramide','#f59e0b')+
         rr('PATROON',rijA2+'-'+rijB2)+
         rr('AANTAL LAGEN',maxLagen+' lagen','#a78bfa')+
         rr('STAPELHOOGTE',stapelHoogte+'mm')+
         rr('ROLLEN PER PALLET',rppToon+' rollen','#f59e0b');
    if(aantalRollen>0)html+=rr('AANTAL PALLETS',pallets2+' pallets','#f59e0b');
    if(losRollen>0)html+=rr('LOS OP PALLET',losRollen+' rollen','#9ca3af');
    html+=rr('HUIDJE LENGTE',huidje+'mm','#34d399');
    if(aantalRollen>0&&aH>0)html+=rr('AANTAL HUIDJES',aH+' stuks');

    // Visualisatie liggend
    for(var lag=maxLagen;lag>=1;lag--){
      var rv=(lag%2===1)?rijA2:rijB2;
      var kleurL=(lag%2===1)?'#f59e0b':'#34d399';
      visual+='<div style="display:flex;justify-content:center;margin:2px 0;">';
      for(var ri=0;ri<rv;ri++){
        visual+='<span style="display:inline-block;width:34px;height:34px;border-radius:50%;background:'+kleurL+';border:2px solid '+kleurL+';opacity:'+(lag%2===1?'1':'0.7')+';margin:3px;vertical-align:middle;"></span>';
      }
      visual+='</div>';
    }
  }

  document.getElementById('pc-output').innerHTML=html;
  document.getElementById('pc-visual').innerHTML=visual;
  document.getElementById('pc-resultaat').style.display='block';
}

// Invul modal
function openInvul(el,label,snel){
  _invulEl=el;_invulWaarde=el.value?String(el.value):'';
  document.getElementById('invul-label').textContent=label;
  var disp=document.getElementById('invul-waarde');
  disp.className='invul-waarde '+(el.classList.contains('veld-definitief')?'groen':'geel');
  disp.textContent=_invulWaarde||'0';
  var snelHtml='';
  if(snel&&snel.length){snel.forEach(function(v){snelHtml+='<div class="invul-snel-btn" onclick="invulSnel('+v+')">'+v+'</div>';});}
  document.getElementById('invul-snel').innerHTML=snelHtml;
  document.getElementById('invul-overlay').style.display='flex';
}
function invulSluit(){document.getElementById('invul-overlay').style.display='none';_invulEl=null;_invulWaarde='';}
function invulCijfer(c){
  if(c==='.'&&_invulWaarde.indexOf('.')>=0)return;
  if(_invulWaarde==='0'&&c!=='.')_invulWaarde=c;else _invulWaarde+=c;
  document.getElementById('invul-waarde').textContent=_invulWaarde;
}
function invulWis(){_invulWaarde=_invulWaarde.slice(0,-1);document.getElementById('invul-waarde').textContent=_invulWaarde||'0';}
function invulSnel(val){_invulWaarde=String(val);document.getElementById('invul-waarde').textContent=_invulWaarde;}
function invulOk(){
  if(!_invulEl||!_invulWaarde){invulSluit();return;}
  _invulEl.value=_invulWaarde;
  _invulEl.classList.remove('veld-leeg');_invulEl.classList.add('veld-definitief');
  invulSluit();
  pcBereken();
}

updatePatroonTabel();
document.getElementById('toon-pc-materiaal').innerHTML='LDPE';
</script>

</body>
</html>
